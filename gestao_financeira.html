<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão Financeira</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 24px 16px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 28px 24px;
            border: 1px solid;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 4px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left svg {
            width: 32px;
            height: 32px;
            transition: fill 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .menu-container {
            position: relative;
            display: inline-block;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .menu-btn svg {
            width: 28px;
            height: 28px;
            transition: fill 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            min-width: 160px;
            border-radius: 12px;
            padding: 8px 0;
            z-index: 10;
            border: 1px solid;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .menu-dropdown.aberto {
            display: block;
        }

        .menu-dropdown .opcao {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 18px;
            border: none;
            background: none;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            transition: color 0.3s ease, background 0.3s ease;
        }

        .menu-dropdown .opcao svg {
            width: 20px;
            height: 20px;
            transition: fill 0.3s ease;
        }

        .menu-dropdown .opcao:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .subtitle {
            font-size: 0.95rem;
            margin-bottom: 24px;
            border-bottom: 1px solid;
            padding-bottom: 12px;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        /* ===== FORMULÁRIO ===== */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            align-items: flex-end;
            padding: 18px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            transition: background 0.3s ease;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1 0 140px;
            min-width: 120px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }

        .form-group input {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
            border: 1px solid;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(46, 139, 94, 0.12);
        }

        .btn {
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            height: 42px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            transition: fill 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn-limpar {
            background: #d4e8e0;
            color: #1a4a3a;
        }

        .btn-limpar:hover {
            background: #c0d8ce;
        }

        /* ===== LISTA ===== */
        .gastos-lista {
            margin: 20px 0 16px 0;
        }

        .gastos-lista h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }

        .gasto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .gasto-item .categoria {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gasto-item .categoria svg {
            width: 18px;
            height: 18px;
            transition: fill 0.3s ease;
        }

        .gasto-item .valor {
            font-weight: 600;
        }

        .gasto-item .remover {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 6px;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .gasto-item .remover svg {
            width: 20px;
            height: 20px;
            transition: fill 0.3s ease;
        }

        .gasto-item .remover:hover svg {
            fill: #b54a3a;
        }

        .vazio {
            text-align: center;
            padding: 20px 0;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        /* ===== RESULTADOS ===== */
        .resultados {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid;
            transition: border-color 0.3s ease;
        }

        .resultado-card {
            flex: 1;
            min-width: 160px;
            padding: 16px 18px;
            border-radius: 12px;
            text-align: center;
            transition: background 0.3s ease;
        }

        .resultado-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        .resultado-card .valor {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 4px;
            transition: color 0.3s ease;
        }

        .grafico-container {
            max-width: 100%;
            height: 280px;
            position: relative;
            margin-top: 10px;
        }

        /* ===== POPUP PERSONALIZADO ===== */
        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .popup-overlay.aberto {
            display: flex;
        }

        .popup-box {
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            padding: 28px 24px;
            border: 1px solid;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .popup-box .popup-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .popup-box .popup-header svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            transition: fill 0.3s ease;
        }

        .popup-box .popup-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .popup-box p {
            font-size: 0.95rem;
            margin: 8px 0 18px 0;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        .popup-box .btn {
            width: 100%;
            justify-content: center;
        }

        /* ===== TEMAS (mantido igual) ===== */
        .tema-light body {
            background: #f2faf5;
            color: #1a3a2a;
        }
        .tema-light .container {
            background: #ffffff;
            border-color: #d4e8e0;
        }
        .tema-light h1 {
            color: #1e5a3a;
        }
        .tema-light .header-left svg {
            fill: #1e5a3a;
        }
        .tema-light .subtitle {
            color: #4a7a6a;
            border-color: #d4e8e0;
        }
        .tema-light .form-row {
            background: #f0f8f5;
        }
        .tema-light .form-group label {
            color: #2a5a4a;
        }
        .tema-light .form-group input {
            background: #ffffff;
            border-color: #c4dcd2;
            color: #1a3a2a;
        }
        .tema-light .form-group input:focus {
            border-color: #2e8b5e;
            box-shadow: 0 0 0 3px rgba(46, 139, 94, 0.12);
        }
        .tema-light .btn {
            background: #2e8b5e;
            color: #fff;
        }
        .tema-light .btn svg {
            fill: #fff;
        }
        .tema-light .btn:hover {
            background: #1f6f4a;
        }
        .tema-light .gastos-lista h3 {
            color: #2a5a4a;
        }
        .tema-light .gasto-item {
            background: #f8fcf9;
            border-color: #e0eee6;
            color: #1a3a2a;
        }
        .tema-light .gasto-item .categoria svg {
            fill: #4a7a6a;
        }
        .tema-light .gasto-item .valor {
            color: #1a5a3a;
        }
        .tema-light .gasto-item .remover svg {
            fill: #8ab0a0;
        }
        .tema-light .vazio {
            color: #8ab0a0;
        }
        .tema-light .resultado-card {
            background: #f0f8f5;
        }
        .tema-light .resultado-card .label {
            color: #4a7a6a;
        }
        .tema-light .resultado-card .valor {
            color: #1a5a3a;
        }
        .tema-light .resultados {
            border-color: #d4e8e0;
        }
        .tema-light .menu-btn svg {
            fill: #1a3a2a;
        }
        .tema-light .menu-dropdown {
            background: #ffffff;
            border-color: #d4e8e0;
        }
        .tema-light .menu-dropdown .opcao {
            color: #1a3a2a;
        }
        .tema-light .menu-dropdown .opcao svg {
            fill: #1a3a2a;
        }
        .tema-light .menu-dropdown .opcao:hover {
            background: #f0f8f5;
        }
        .tema-light .popup-box {
            background: #ffffff;
            border-color: #d4e8e0;
            color: #1a3a2a;
        }
        .tema-light .popup-box .popup-header svg {
            fill: #b54a3a;
        }
        .tema-light .popup-box .popup-header h3 {
            color: #1a3a2a;
        }
        .tema-light .popup-box p {
            color: #4a6a5a;
        }

        .tema-dark body {
            background: #1a2a22;
            color: #d4e8e0;
        }
        .tema-dark .container {
            background: #243a30;
            border-color: #3a5a4a;
        }
        .tema-dark h1 {
            color: #b0d8c8;
        }
        .tema-dark .header-left svg {
            fill: #b0d8c8;
        }
        .tema-dark .subtitle {
            color: #8ab0a0;
            border-color: #3a5a4a;
        }
        .tema-dark .form-row {
            background: #1e3228;
        }
        .tema-dark .form-group label {
            color: #8ab0a0;
        }
        .tema-dark .form-group input {
            background: #2a4034;
            border-color: #3a5a4a;
            color: #d4e8e0;
        }
        .tema-dark .form-group input:focus {
            border-color: #5cb087;
            box-shadow: 0 0 0 3px rgba(92, 176, 135, 0.15);
        }
        .tema-dark .btn {
            background: #3a7a5a;
            color: #fff;
        }
        .tema-dark .btn svg {
            fill: #fff;
        }
        .tema-dark .btn:hover {
            background: #2e8b5e;
        }
        .tema-dark .btn-limpar {
            background: #3a5a4a;
            color: #b0d8c8;
        }
        .tema-dark .btn-limpar svg {
            fill: #b0d8c8;
        }
        .tema-dark .btn-limpar:hover {
            background: #4a6a5a;
        }
        .tema-dark .gastos-lista h3 {
            color: #b0d8c8;
        }
        .tema-dark .gasto-item {
            background: #1e3228;
            border-color: #3a5a4a;
            color: #d4e8e0;
        }
        .tema-dark .gasto-item .categoria svg {
            fill: #8ab0a0;
        }
        .tema-dark .gasto-item .valor {
            color: #7ac4a0;
        }
        .tema-dark .gasto-item .remover svg {
            fill: #5a7a6a;
        }
        .tema-dark .vazio {
            color: #5a7a6a;
        }
        .tema-dark .resultado-card {
            background: #1e3228;
        }
        .tema-dark .resultado-card .label {
            color: #8ab0a0;
        }
        .tema-dark .resultado-card .valor {
            color: #7ac4a0;
        }
        .tema-dark .resultados {
            border-color: #3a5a4a;
        }
        .tema-dark .menu-btn svg {
            fill: #d4e8e0;
        }
        .tema-dark .menu-dropdown {
            background: #243a30;
            border-color: #3a5a4a;
        }
        .tema-dark .menu-dropdown .opcao {
            color: #d4e8e0;
        }
        .tema-dark .menu-dropdown .opcao svg {
            fill: #d4e8e0;
        }
        .tema-dark .menu-dropdown .opcao:hover {
            background: #2a4034;
        }
        .tema-dark .popup-box {
            background: #243a30;
            border-color: #3a5a4a;
            color: #d4e8e0;
        }
        .tema-dark .popup-box .popup-header svg {
            fill: #e88a7a;
        }
        .tema-dark .popup-box .popup-header h3 {
            color: #d4e8e0;
        }
        .tema-dark .popup-box p {
            color: #8ab0a0;
        }

        .tema-roxo body {
            background: #f5f0fa;
            color: #2a1a3a;
        }
        .tema-roxo .container {
            background: #ffffff;
            border-color: #d8cce8;
        }
        .tema-roxo h1 {
            color: #5a3a7a;
        }
        .tema-roxo .header-left svg {
            fill: #5a3a7a;
        }
        .tema-roxo .subtitle {
            color: #7a5a9a;
            border-color: #d8cce8;
        }
        .tema-roxo .form-row {
            background: #f0eaf8;
        }
        .tema-roxo .form-group label {
            color: #5a3a7a;
        }
        .tema-roxo .form-group input {
            background: #ffffff;
            border-color: #d0c0e0;
            color: #2a1a3a;
        }
        .tema-roxo .form-group input:focus {
            border-color: #8a5abe;
            box-shadow: 0 0 0 3px rgba(138, 90, 190, 0.12);
        }
        .tema-roxo .btn {
            background: #7a4a9a;
            color: #fff;
        }
        .tema-roxo .btn svg {
            fill: #fff;
        }
        .tema-roxo .btn:hover {
            background: #6a3a8a;
        }
        .tema-roxo .btn-limpar {
            background: #e0d4ec;
            color: #3a2a4a;
        }
        .tema-roxo .btn-limpar svg {
            fill: #3a2a4a;
        }
        .tema-roxo .btn-limpar:hover {
            background: #d0c0e0;
        }
        .tema-roxo .gastos-lista h3 {
            color: #5a3a7a;
        }
        .tema-roxo .gasto-item {
            background: #f8f4fc;
            border-color: #e0d4ec;
            color: #2a1a3a;
        }
        .tema-roxo .gasto-item .categoria svg {
            fill: #7a5a9a;
        }
        .tema-roxo .gasto-item .valor {
            color: #5a3a7a;
        }
        .tema-roxo .gasto-item .remover svg {
            fill: #a090b0;
        }
        .tema-roxo .vazio {
            color: #a090b0;
        }
        .tema-roxo .resultado-card {
            background: #f0eaf8;
        }
        .tema-roxo .resultado-card .label {
            color: #7a5a9a;
        }
        .tema-roxo .resultado-card .valor {
            color: #5a3a7a;
        }
        .tema-roxo .resultados {
            border-color: #d8cce8;
        }
        .tema-roxo .menu-btn svg {
            fill: #2a1a3a;
        }
        .tema-roxo .menu-dropdown {
            background: #ffffff;
            border-color: #d8cce8;
        }
        .tema-roxo .menu-dropdown .opcao {
            color: #2a1a3a;
        }
        .tema-roxo .menu-dropdown .opcao svg {
            fill: #2a1a3a;
        }
        .tema-roxo .menu-dropdown .opcao:hover {
            background: #f0eaf8;
        }
        .tema-roxo .popup-box {
            background: #ffffff;
            border-color: #d8cce8;
            color: #2a1a3a;
        }
        .tema-roxo .popup-box .popup-header svg {
            fill: #b56a9a;
        }
        .tema-roxo .popup-box .popup-header h3 {
            color: #2a1a3a;
        }
        .tema-roxo .popup-box p {
            color: #5a4a6a;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 700px) {
            .container {
                padding: 16px 12px;
            }
            .form-group {
                flex: 1 0 100%;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .resultado-card {
                min-width: 100%;
            }
            .grafico-container {
                height: 200px;
            }
            .gasto-item {
                flex-wrap: wrap;
                gap: 4px 8px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .menu-container {
                align-self: flex-end;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px 8px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .subtitle {
                font-size: 0.8rem;
            }
            .form-row {
                padding: 14px 10px;
            }
            .form-group {
                min-width: 100%;
            }
            .form-group input {
                font-size: 0.9rem;
                padding: 6px 10px;
            }
            .btn {
                font-size: 0.9rem;
                padding: 8px 16px;
                height: 38px;
            }
            .grafico-container {
                height: 160px;
            }
            .resultado-card .valor {
                font-size: 1.1rem;
            }
            .popup-box {
                padding: 20px 16px;
            }
        }
    </style>
</head>

                        Light
                    </button>
                    <button class="opcao" data-tema="dark">
                        <svg viewBox="0 0 24 24"><path d="M9 2c-1.05 0-2.05.16-3 .46 4.06 1.27 7 5.06 7 9.54 0 4.48-2.94 8.27-7 9.54.95.3 1.95.46 3 .46 5.52 0 10-4.48 10-10S14.52 2 9 2z"/></svg>
                        Dark
                    </button>
                    <button class="opcao" data-tema="roxo">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        Roxo
                    </button>
                </div>
            </div>
        </div>
        <div class="subtitle">Registre seus gastos e veja onde seu dinheiro está indo</div>

        <!-- Formulário -->
        <div class="form-row">
            <div class="form-group">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" placeholder="Ex: Mercado" />
            </div>
            <div class="form-group">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" placeholder="0,00" step="0.01" min="0" />
            </div>
            <div class="form-group">
                <label for="categoria">Categoria</label>
                <input type="text" id="categoria" placeholder="Ex: Alimentação" />
            </div>
            <button class="btn" id="addBtn">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Adicionar
            </button>
            <button class="btn btn-limpar" id="limparBtn">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Limpar tudo
            </button>
        </div>

        <!-- Lista de gastos -->
        <div class="gastos-lista">
            <h3>Gastos registrados</h3>
            <div id="listaContainer">
                <div class="vazio">Nenhum gasto registrado ainda.</div>
            </div>
        </div>

        <!-- Resultados -->
        <div class="resultados">
            <div class="resultado-card">
                <div class="label">Total de gastos</div>
                <div class="valor" id="totalGastos">R$ 0,00</div>
            </div>
            <div class="resultado-card">
                <div class="label">Maior gasto</div>
                <div class="valor" id="maiorGasto">R$ 0,00</div>
            </div>
            <div class="resultado-card">
                <div class="label">Quantidade de gastos</div>
                <div class="valor" id="quantidadeGastos">0</div>
            </div>
        </div>

        <!-- Gráfico -->
        <div style="margin-top:20px; padding-top:20px; border-top:1px solid; transition: border-color 0.3s ease;" id="graficoBorder">
            <h3 style="font-size:1rem; transition: color 0.3s ease;" id="graficoTitulo">Distribuição por categoria</h3>
            <div class="grafico-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>
    </div>

    <!-- ===== POPUP ===== -->
    <div class="popup-overlay" id="popup">
        <div class="popup-box">
            <div class="popup-header">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <h3 id="popupTitulo">Atenção</h3>
            </div>
            <p id="popupMensagem">Mensagem aqui.</p>
            <button class="btn" id="popupBtn">Ok</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== DOM =====
            const descricaoInput = document.getElementById('descricao');
            const valorInput = document.getElementById('valor');
            const categoriaInput = document.getElementById('categoria');
            const addBtn = document.getElementById('addBtn');
            const limparBtn = document.getElementById('limparBtn');
            const listaContainer = document.getElementById('listaContainer');
            const totalGastosEl = document.getElementById('totalGastos');
            const maiorGastoEl = document.getElementById('maiorGasto');
            const quantidadeGastosEl = document.getElementById('quantidadeGastos');
            const graficoCanvas = document.getElementById('graficoPizza');

            const menuBtn = document.getElementById('menuBtn');
            const menuDropdown = document.getElementById('menuDropdown');

            const popup = document.getElementById('popup');
            const popupTitulo = document.getElementById('popupTitulo');
            const popupMensagem = document.getElementById('popupMensagem');
            const popupBtn = document.getElementById('popupBtn');

            let gastos = [];
            let chart = null;

            // ===== POPUP =====
            function mostrarPopup(titulo, mensagem) {
                popupTitulo.textContent = titulo;
                popupMensagem.textContent = mensagem;
                popup.classList.add('aberto');
            }

            function fecharPopup() {
                popup.classList.remove('aberto');
            }

            popupBtn.addEventListener('click', fecharPopup);
            popup.addEventListener('click', function(e) {
                if (e.target === popup) fecharPopup();
            });

            // ===== MENU =====
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                menuDropdown.classList.toggle('aberto');
            });

            document.addEventListener('click', function() {
                menuDropdown.classList.remove('aberto');
            });

            // ===== TEMAS =====
            function aplicarTema(tema) {
                document.body.className = '';
                document.body.classList.add('tema-' + tema);
                localStorage.setItem('tema', tema);
                menuDropdown.classList.remove('aberto');
            }

            document.querySelectorAll('.opcao').forEach(function(opcao) {
                opcao.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const tema = this.getAttribute('data-tema');
                    aplicarTema(tema);
                });
            });

            const temaSalvo = localStorage.getItem('tema') || 'light';
            aplicarTema(temaSalvo);

            // ===== LOCALSTORAGE =====
            function carregarGastos() {
                const dados = localStorage.getItem('gastos');
                if (dados) {
                    try {
                        gastos = JSON.parse(dados);
                    } catch (_) {
                        gastos = [];
                    }
                } else {
                    gastos = [];
                }
                renderizarTudo();
            }

            function salvarGastos() {
                localStorage.setItem('gastos', JSON.stringify(gastos));
            }

            // ===== ADICIONAR =====
            function adicionarGasto() {
                const descricao = descricaoInput.value.trim();
                const valor = parseFloat(valorInput.value);
                const categoria = categoriaInput.value.trim();

                if (!descricao) {
                    mostrarPopup('Campo vazio', 'Por favor, digite uma descrição.');
                    return;
                }
                if (isNaN(valor) || valor <= 0) {
                    mostrarPopup('Valor inválido', 'Por favor, digite um valor maior que zero.');
                    return;
                }
                if (!categoria) {
                    mostrarPopup('Campo vazio', 'Por favor, digite uma categoria.');
                    return;
                }

                gastos.push({
                    id: Date.now(),
                    descricao: descricao,
                    valor: valor,
                    categoria: categoria,
                });

                salvarGastos();
                descricaoInput.value = '';
                valorInput.value = '';
                categoriaInput.value = '';
                descricaoInput.focus();
                renderizarTudo();
            }

            // ===== REMOVER =====
            function removerGasto(id) {
                gastos = gastos.filter(g => g.id !== id);
                salvarGastos();
                renderizarTudo();
            }

            // ===== LIMPAR =====
            function limparTudo() {
                if (gastos.length === 0) return;
                mostrarPopup('Confirmar', 'Tem certeza que deseja remover todos os gastos?');
                // Sobrescrever o botão Ok para confirmar
                const confirmarBtn = document.getElementById('popupBtn');
                const confirmarHandler = function() {
                    gastos = [];
                    salvarGastos();
                    renderizarTudo();
                    fecharPopup();
                    confirmarBtn.removeEventListener('click', confirmarHandler);
                    // Restaurar comportamento padrão
                    confirmarBtn.addEventListener('click', fecharPopup);
                };
                confirmarBtn.removeEventListener('click', fecharPopup);
                confirmarBtn.addEventListener('click', confirmarHandler);
                // Ajustar para fechar com overlay sem ação
                popup.onclick = function(e) {
                    if (e.target === popup) {
                        fecharPopup();
                        confirmarBtn.removeEventListener('click', confirmarHandler);
                        confirmarBtn.addEventListener('click', fecharPopup);
                    }
                };
            }

            // ===== RENDERIZAR =====
            function renderizarLista() {
                if (gastos.length === 0) {
                    listaContainer.innerHTML = '<div class="vazio">Nenhum gasto registrado ainda.</div>';
                    return;
                }

                let html = '';
                gastos.forEach(g => {
                    html += `
                            <div class="gasto-item">
                                <span class="categoria">
                                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                                    ${g.categoria}
                                </span>
                                <span>${g.descricao}</span>
                                <span class="valor">R$ ${g.valor.toFixed(2)}</span>
                                <button class="remover" data-id="${g.id}">
                                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                                </button>
                            </div>
                        `;
                });
                listaContainer.innerHTML = html;

                document.querySelectorAll('.remover').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.getAttribute('data-id'));
                        removerGasto(id);
                    });
                });
            }

            function renderizarResultados() {
                if (gastos.length === 0) {
                    totalGastosEl.textContent = 'R$ 0,00';
                    maiorGastoEl.textContent = 'R$ 0,00';
                    quantidadeGastosEl.textContent = '0';
                    return;
                }

                const total = gastos.reduce((acc, g) => acc + g.valor, 0);
                const maior = Math.max(...gastos.map(g => g.valor));
                const qtd = gastos.length;

                totalGastosEl.textContent = `R$ ${total.toFixed(2)}`;
                maiorGastoEl.textContent = `R$ ${maior.toFixed(2)}`;
                quantidadeGastosEl.textContent = qtd;
            }

            function renderizarGrafico() {
                if (chart) {
                    chart.destroy();
                    chart = null;
                }

                if (gastos.length === 0) return;

                const categorias = {};
                gastos.forEach(g => {
                    if (categorias[g.categoria]) {
                        categorias[g.categoria] += g.valor;
                    } else {
                        categorias[g.categoria] = g.valor;
                    }
                });

                const labels = Object.keys(categorias);
                const dados = Object.values(categorias);
                const cores = [
                    '#2e8b5e', '#4a9e7a', '#5cb087', '#7ac4a0',
                    '#96d0b0', '#a8d5c2', '#bce0d4', '#c4e4d8',
                    '#8ab8a8', '#6aaa8a', '#3a7a5a', '#1a5a3a'
                ];

                const ctx = graficoCanvas.getContext('2d');
                chart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dados,
                            backgroundColor: cores.slice(0, labels.length),
                            borderColor: '#ffffff',
                            borderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    padding: 16,
                                    usePointStyle: true,
                                    font: { size: 12, family: 'Segoe UI' }
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const pct = ((context.raw / total) * 100).toFixed(1);
                                        return `R$ ${context.raw.toFixed(2)} (${pct}%)`;
                                    }
                                }
                            }
                        }
                    }
                });
            }

            function renderizarTudo() {
                renderizarLista();
                renderizarResultados();
                renderizarGrafico();
            }

            // ===== EVENTOS =====
            addBtn.addEventListener('click', adicionarGasto);

            limparBtn.addEventListener('click', function() {
                // Remover listeners antigos e usar o comportamento padrão de confirmação
                const confirmarBtn = document.getElementById('popupBtn');
                // Se houver listener de confirmação anterior, remover
                // O limparTudo já trata isso internamente
                limparTudo();
            });

            [descricaoInput, valorInput, categoriaInput].forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        adicionarGasto();
                    }
                });
            });

            // ===== INICIAR =====
            carregarGastos();

        })();
    </script>

</body>
</html>
